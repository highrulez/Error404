name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Validation only — does not deploy to Synology or push images.
permissions:
  contents: read

jobs:
  validate:
    name: Lint, build, Docker image
    runs-on: ubuntu-latest
    env:
      # Harmless placeholders so the build does not need real AWS secrets.
      # SES stays inactive unless EMAIL_MODE is ses/both with real credentials at runtime.
      EMAIL_MODE: mock
      NEXT_PUBLIC_APP_URL: https://ppg.highrulez.com
      SES_FROM_NAME: OneFlow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

      - name: Docker image build
        run: docker build -t oneflow-ci .
